<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfólio — Leonardo Morais Cruz</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="card">

    <!-- PERFIL — preenchido pelo app.js via data.json -->
    <div class="profile">
      <div class="profile__dots">
        <span></span><span></span><span></span>
      </div>
      <div class="avatar-wrap">
        <img class="avatar-wrap__img" src="" alt="" />
      </div>
      <div class="profile__info">
        <div class="greeting"></div>
        <div class="meta"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ACCORDION -->
    <div class="accordion">

      <!-- SKILLS -->
      <div class="accordion__item" data-section="skills">
        <button class="accordion__trigger">
          <span class="accordion__label">Skills</span>
          <i class="fa-solid fa-chevron-down accordion__icon"></i>
        </button>
        <div class="accordion__body">
          <div class="accordion__content">
            <div class="skills-grid" id="skills-grid"></div>
          </div>
        </div>
      </div>

      <!-- IDIOMAS -->
      <div class="accordion__item" data-section="idiomas">
        <button class="accordion__trigger">
          <span class="accordion__label">Idiomas</span>
          <i class="fa-solid fa-chevron-down accordion__icon"></i>
        </button>
        <div class="accordion__body">
          <div class="accordion__content">
            <div class="lang-list" id="idiomas-lista"></div>
          </div>
        </div>
      </div>

      <!-- EDUCAÇÃO -->
      <div class="accordion__item" data-section="educacao">
        <button class="accordion__trigger">
          <span class="accordion__label">Educação</span>
          <i class="fa-solid fa-chevron-down accordion__icon"></i>
        </button>
        <div class="accordion__body">
          <div class="accordion__content">
            <div id="educacao-lista"></div>
          </div>
        </div>
      </div>

      <!-- PORTFÓLIO -->
      <div class="accordion__item" data-section="portfolio">
        <button class="accordion__trigger">
          <span class="accordion__label">Portfolio</span>
          <i class="fa-solid fa-chevron-down accordion__icon"></i>
        </button>
        <div class="accordion__body">
          <div class="accordion__content">
            <div class="project-list" id="projetos-lista"></div>
          </div>
        </div>
      </div>

      <!-- EXPERIÊNCIA -->
      <div class="accordion__item" data-section="experiencia">
        <button class="accordion__trigger">
          <span class="accordion__label">Experiência Profissional</span>
          <i class="fa-solid fa-chevron-down accordion__icon"></i>
        </button>
        <div class="accordion__body">
          <div class="accordion__content">
            <div id="exp-lista"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <span class="card-footer__copy">© 2026 — L.K.</span>
      <div class="card-footer__links"></div>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
